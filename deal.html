<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TAEL Deal</title>
    <meta
      name="description"
      content="TAEL project financing deal detail."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;600&family=Noto+Sans+SC:wght@300;400;500&family=Noto+Serif+SC:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body data-page="deal" class="noise">
    <div class="page-shell">
      <header class="artifact-bar detail-global-header">
        <div class="artifact-bar-inner">
          <div class="artifact-left">
            <a href="./index.html" class="back-link mono" style="font-size:11px;letter-spacing:0.14em;">← MARKETS</a>
            <div class="artifact-brandline" style="margin-left:16px;padding-left:16px;border-left:1px solid var(--line);">
              <strong>Tael</strong>
              <span class="mono" style="font-size:10px;letter-spacing:0.16em;color:var(--ink-faint);">兩 · PRIVATE</span>
            </div>
          </div>
          <div class="artifact-actions">
            <div class="wallet-chip">
              <span class="wallet-label mono" style="font-size:9px;letter-spacing:0.18em;">INVITED AS</span>
              <strong class="mono" style="font-size:11px;letter-spacing:0.08em;">#4729</strong>
            </div>
            <div class="wallet-chip wallet-chip-balance">
              <span class="mono" style="font-size:9px;letter-spacing:0.18em;">WALLET</span>
              <strong id="wallet-balance" class="mono" style="font-size:13px;color:var(--gold);">$1,000,000 USDT</strong>
            </div>
            <div class="lang-toggle">
              <button class="lang-btn active" data-lang="en">EN</button>
              <span class="lang-sep">·</span>
              <button class="lang-btn" data-lang="zh">中</button>
            </div>
          </div>
        </div>
      </header>

      <div id="live-ticker"></div>
      <div id="urgency-banner"></div>

      <main class="content-frame detail-page-frame">
        <section id="deal-page-detail" class="detail-page-panel"></section>
      </main>

      <footer style="border-top:1px solid var(--line);margin-top:60px;padding:24px 0;text-align:center;">
        <div style="font-family:'Instrument Serif',serif;font-style:italic;color:var(--ink-faint);font-size:13px;">Tael · 兩</div>
        <div class="mono" style="font-size:9px;color:var(--ink-faint);letter-spacing:0.16em;margin-top:6px;">PRIVATE · INVITATION ONLY · NOT FOR DISTRIBUTION</div>
      </footer>
    </div>

    <dialog id="action-modal" class="action-modal"></dialog>

    <script src="./app.js"></script>
  </body>
</html>
